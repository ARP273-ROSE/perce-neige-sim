name: Tests physique

# Filet anti-régression : la physique calibrée (profil, freins, tension,
# rebond, survitesse, audio moteur) est verrouillée par tests/test_physics.py
# — exécutés à chaque push/PR, AVANT de tagger une release.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  physics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System libs (Qt offscreen)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1 libegl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install deps
        run: pip install PyQt6 pytest

      - name: Run physics tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v --tb=short
