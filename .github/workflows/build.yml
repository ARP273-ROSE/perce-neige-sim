name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.1-stable"
  GODOT_BIN_TAG: "4.6.1"

jobs:
  # --------------------------------------------------------------------- #
  # Job 1 : exporte le viewer Godot 3D (Linux + Windows binaires) sur
  # Linux runner. Cross-compile Windows depuis Linux via les templates.
  # Les binaires sont uploadés en artifact pour les jobs build-* qui suivent.
  # --------------------------------------------------------------------- #
  godot-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary + templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/godot/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot binary + templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/godot
          cd ~/godot
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_linux.x86_64.zip"
          unzip -q "Godot_v${{ env.GODOT_VERSION }}_linux.x86_64.zip"
          mv "Godot_v${{ env.GODOT_VERSION }}_linux.x86_64" godot
          chmod +x godot
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_BIN_TAG }}.stable
          cd /tmp
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_export_templates.tpz"
          unzip -q "Godot_v${{ env.GODOT_VERSION }}_export_templates.tpz"
          cp templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_BIN_TAG }}.stable/

      # Note : l'export Godot headless peut retourner un code non nul malgré
      # un export réussi (warnings) → on ne teste pas le code retour mais la
      # présence effective du binaire produit.
      - name: Export Linux x86_64 viewer
        run: |
          set -e
          mkdir -p bundled_godot
          ~/godot/godot --headless --path godot_project --export-release "Linux x86_64" || true
          ls -lh bundled_godot/
          test -f bundled_godot/perce_neige_3d.x86_64 || (echo "ERROR: export Linux échoué (binaire absent)"; exit 1)

      - name: Export Windows x86_64 viewer
        run: |
          set -e
          ~/godot/godot --headless --path godot_project --export-release "Windows x86_64" || true
          ls -lh bundled_godot/
          test -f bundled_godot/perce_neige_3d.exe || (echo "ERROR: export Windows échoué (binaire absent)"; exit 1)

      - name: Upload viewer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-viewers
          path: bundled_godot/
          retention-days: 7

  # --------------------------------------------------------------------- #
  # Job 2 : Windows build avec viewer Godot embarqué
  # --------------------------------------------------------------------- #
  build-windows:
    needs: godot-export
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Download Godot viewers
        uses: actions/download-artifact@v4
        with:
          name: godot-viewers
          path: bundled_godot

      - name: Verify bundled_godot content
        shell: bash
        run: |
          ls -lh bundled_godot/
          test -f bundled_godot/perce_neige_3d.exe || (echo "ERROR: viewer Windows manquant" && exit 1)

      - name: Regenerate logos (ensure icon is present)
        shell: bash
        run: python make_logo.py

      - name: Build .exe
        shell: bash
        run: pyinstaller --noconfirm perce_neige.spec

      - name: Rename asset
        shell: bash
        run: mv dist/PerceNeigeSimulator.exe dist/PerceNeigeSimulator-windows.exe

      # Le viewer 3D standalone est aussi publié en asset de release :
      # il est gitignoré (125 Mo), donc quand on lance le sim DEPUIS LES
      # SOURCES sur une machine sans Godot, l'appli propose de le
      # télécharger ici (vérifié via SHA256SUMS).
      - name: Stage viewer assets
        shell: bash
        run: |
          cp bundled_godot/perce_neige_3d.exe dist/perce_neige_3d-windows.exe
          cp bundled_godot/perce_neige_3d.x86_64 dist/perce_neige_3d-linux.x86_64 || true

      # SHA256SUMS est vérifié par autoupdate.py avant de remplacer l'exe
      # en place ou d'installer le viewer 3D — une release sans ce fichier
      # sera REFUSÉE par l'auto-update.
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd dist
          sha256sum PerceNeigeSimulator-windows.exe perce_neige_3d-* > SHA256SUMS
          cat SHA256SUMS

      - name: Show final exe size
        shell: bash
        run: ls -lh dist/

      - name: Upload asset to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 📥 Quel fichier télécharger ?

            | Fichier | C'est quoi ? |
            |---|---|
            | **`PerceNeigeSimulator-windows.exe`** | ⭐ **LE SIMULATEUR COMPLET** — le seul fichier à télécharger pour jouer (vue 3D incluse, rien d'autre à installer). |
            | `perce_neige_3d-windows.exe` / `-linux.x86_64` | Viewer 3D seul — téléchargé automatiquement par l'application pour ceux qui lancent depuis les sources. **Ne pas lancer directement.** |
            | `SHA256SUMS` | Empreintes d'intégrité, vérifiées automatiquement par l'auto-update. |

            Premier lancement : Windows SmartScreen peut alerter (exe non signé) → « Informations complémentaires » puis « Exécuter quand même ». Touche **F4** ×2 pour la vue 3D, **L** pour English.
          files: |
            dist/PerceNeigeSimulator-windows.exe
            dist/perce_neige_3d-windows.exe
            dist/perce_neige_3d-linux.x86_64
            dist/SHA256SUMS
          fail_on_unmatched_files: false

      - name: Upload build artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PerceNeigeSimulator-windows
          path: dist/PerceNeigeSimulator-windows.exe
