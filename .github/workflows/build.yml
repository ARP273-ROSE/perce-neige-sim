name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Regenerate logos (ensure icon is present)
        shell: bash
        run: python make_logo.py

      - name: Build .exe
        shell: bash
        run: pyinstaller --noconfirm perce_neige.spec

      - name: Rename asset
        shell: bash
        run: mv dist/PerceNeigeSimulator.exe dist/PerceNeigeSimulator-windows.exe

      - name: Upload asset to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PerceNeigeSimulator-windows.exe
          fail_on_unmatched_files: false

      - name: Upload build artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PerceNeigeSimulator-windows
          path: dist/PerceNeigeSimulator-windows.exe
